<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:black;
color:white;
}

#reader{
width:100%;
position:relative;
}

#frame{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:250px;
height:250px;
border:4px solid white;
border-radius:12px;
box-shadow:0 0 20px rgba(255,255,255,0.3);
pointer-events:none;
}

#frame.sucesso{
border:4px solid #00ff88;
box-shadow:0 0 25px #00ff88;
}

#mensagem{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.8);
padding:20px 30px;
border-radius:10px;
font-size:22px;
display:none;
}
</style>

</head>

<body>

<h3>Escaneando...</h3>

<div id="reader">
<div id="frame"></div>
</div>

<div id="mensagem">
✔ Leitura confirmada
</div>

<script>

/* segurança básica */

if(!window.opener){
 document.body.innerHTML="<h3>Acesso inválido</h3>";
 throw new Error("Sem opener");
}

/* valida origem do Apps Script */

const allowedOrigins = [
 "https://script.google.com",
 "https://script.googleusercontent.com"
];

let origemValida = false;

try{
 const openerOrigin = window.opener.location.origin;
 origemValida = allowedOrigins.includes(openerOrigin);
}catch(e){
 origemValida = false;
}

if(!origemValida){
 document.body.innerHTML="<h3>Acesso não autorizado</h3>";
 throw new Error("Origem inválida");
}

/* token */

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

if(!token){
 document.body.innerHTML="<h3>Token inválido</h3>";
 throw new Error("Sem token");
}


/* scanner */

const scanner = new Html5Qrcode("reader");

let leituraFeita = false;

function sucesso(qr){

 if(leituraFeita) return;

 leituraFeita = true;

 document.getElementById("frame").classList.add("sucesso");
 document.getElementById("mensagem").style.display="block";

 scanner.stop().then(()=>{

  setTimeout(()=>{

   window.opener.postMessage({
     tipo:"qr",
     codigo:qr,
     token:token
   },"*");

  },400);

 });

}


/* iniciar câmera */

async function iniciar(){

 const cameras = await Html5Qrcode.getCameras();

 if(!cameras || cameras.length===0){
  document.body.innerHTML="<h3>Nenhuma câmera encontrada</h3>";
  return;
 }

 let cameraId = cameras[0].id;

 for(const cam of cameras){

  const label = cam.label.toLowerCase();

  if(
   label.includes("back") ||
   label.includes("rear") ||
   label.includes("environment") ||
   label.includes("traseira")
  ){
   cameraId = cam.id;
   break;
  }

 }

 scanner.start(
  cameraId,
  { fps:10, qrbox:250 },
  sucesso
 );

}

iniciar();

</script>

</body>
</html>
