<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { margin:0; font-family:Arial; text-align:center; background:black; color:white; }
    #reader { width:100%; position:relative; }
    #frame {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:250px; height:250px;
      border:4px solid white; border-radius:12px;
      box-shadow:0 0 20px rgba(255,255,255,0.3);
      pointer-events:none;
    }
    #frame.sucesso { border:4px solid #00ff88; box-shadow:0 0 25px #00ff88; }
    #mensagem {
      position:fixed; top:40%; left:50%;
      transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.8);
      padding:20px 30px; border-radius:10px;
      font-size:22px; display:none;
    }
  </style>
</head>
<body>

<h3 id="status">Validando acesso...</h3>
<div id="reader" style="display:none;"><div id="frame"></div></div>
<div id="mensagem">✔ Leitura confirmada</div>

<script>

/* === CONFIG === */
// TODO: Cole a URL de Produção que você gerar no Deploy.
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz3mSh-XNXQVG4Qth5Q_X4J2DRG-jPq4BI-iLubUWyIxDLiDTDRUGmLF116YijnkXO2/exec";

/* === BLOQUEIO: precisa ser popup === */
if (!window.opener) {
  document.body.innerHTML = "<h3>Acesso inválido</h3>";
  throw new Error("Sem opener");
}

/* === PARAMETROS (TOKEN E ORIGEM) === */
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

// Recebemos a origem dinamicamente enviada pelo WebApp para garantir segurança CORS correta no postMessage!
const paramOrigem = params.get("origem");
const origemWebApp = paramOrigem ? decodeURIComponent(paramOrigem) : "*";

if (!token) {
  document.body.innerHTML = "<h3>Token inválido</h3>";
  throw new Error("Sem token");
}

/* === VALIDAR TOKEN NO BACKEND === */
async function validarToken() {
  try {
    const res = await fetch(`${WEBAPP_URL}?action=validar&token=${token}`);
    const data = await res.json();

    if (!data.valido) {
      mostrarErro(data.erro || "Token inválido");
      return false;
    }

    return true;

  } catch (err) {
    mostrarErro("Erro de comunicação com o servidor.");
    return false;
  }
}

/* === ERRO COM FECHAMENTO === */
function mostrarErro(msg) {
  document.getElementById("status").innerText = msg;
  setTimeout(() => window.close(), 2500);
}

/* === SCANNER === */
const scanner = new Html5Qrcode("reader");
let leituraFeita = false;

function sucesso(qr) {
  if (leituraFeita) return;
  leituraFeita = true;

  document.getElementById("frame").classList.add("sucesso");
  document.getElementById("mensagem").style.display = "block";

  const enviar = () => {
    setTimeout(() => {
      // Usando a origemWebApp ao invés de fixo para passar pela barreira do Iframe Sandboxing
      window.opener.postMessage({
        tipo: "qr",
        codigo: qr,
        token: token
      }, origemWebApp);

      setTimeout(() => window.close(), 300);
    }, 400);
  };

  // Garante o fechamento mesmo em erro do scanner
  scanner.stop().then(enviar).catch(enviar);
}

/* === INICIAR CÂMERA === */
async function iniciarCamera() {
  try {
    document.getElementById("status").innerText = "Escaneando...";
    document.getElementById("reader").style.display = "block";

    const cameras = await Html5Qrcode.getCameras();
    if (!cameras || cameras.length === 0) {
      mostrarErro("Nenhuma câmera encontrada");
      return;
    }

    let cameraId = cameras[cameras.length - 1].id;

    for (const cam of cameras) {
      const label = cam.label.toLowerCase();
      if (label.includes("back") || label.includes("rear") ||
          label.includes("environment") || label.includes("traseira")) {
        cameraId = cam.id;
        break;
      }
    }

    await scanner.start(cameraId, { fps: 10, qrbox: 250 }, sucesso);

  } catch (err) {
    mostrarErro("Erro ao acessar câmera: " + err.message);
    console.error(err);
  }
}

/* === FLUXO PRINCIPAL === */
(async () => {
  const valido = await validarToken();
  if (!valido) return;
  iniciarCamera();
})();

</script>
</body>
</html>
